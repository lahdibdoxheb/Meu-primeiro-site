<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página com Modo Escuro</title>
    <style>
        /* Variáveis de Cores para facilitar a troca */
        :root {
            --bg-body: #e9ecef;
            --bg-card: #ffffff;
            --text-main: #333333;
            --primary: #1a73e8;
            --border: #ccc;
        }

        /* Cores para o Modo Escuro */
        body.dark-mode {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-main: #f0f0f0;
            --primary: #8ab4f8;
            --border: #444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: background 0.3s, color 0.3s;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 { margin-top: 0; color: var(--primary); text-align: center; }
        
        input, textarea {
            width: 100%; padding: 10px; border: 1px solid var(--border);
            border-radius: 6px; box-sizing: border-box; font-size: 1em;
            background: var(--bg-card); color: var(--text-main);
        }

        .btn-enviar {
            width: 100%; padding: 12px; background-color: var(--primary);
            color: #fff; border: none; border-radius: 6px;
            font-size: 1em; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        /* Botão de Alternar Tema */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            border-radius: 50px;
            border: none;
            background: var(--primary);
            color: white;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-limpar {
            width: 100%; padding: 8px; background-color: transparent;
            color: #d93025; border: 1px solid #d93025; border-radius: 6px;
            font-size: 0.9em; cursor: pointer; margin-top: 15px;
        }

        #status-mensagem { display: none; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

    <button class="theme-toggle" id="themeToggle">Trocar Tema 🌓</button>

    <div class="container">
        <div id="form-content">
            <h2>Contato</h2>
            <form id="meuFormulario">
                <div style="margin-bottom:15px">
                    <label>Nome</label>
                    <input type="text" id="nome" required>
                </div>
                <div style="margin-bottom:15px">
                    <label>E-mail</label>
                    <input type="email" id="email" required>
                </div>
                <button type="submit" class="btn-enviar">Salvar Dados</button>
            </form>
            <button id="btnLimpar" class="btn-limpar">Limpar Tudo</button>
        </div>

        <div id="status-mensagem">
            <p>✅ Dados salvos!</p>
            <button class="btn-enviar" onclick="location.reload()">Voltar</button>
        </div>
    </div>

    <script>
        const btnTheme = document.getElementById('themeToggle');
        const body = document.body;

        // 1. CARREGAR TEMA E DADOS SALVOS
        window.onload = () => {
            // Carregar Tema
            if (localStorage.getItem('tema') === 'dark') {
                body.classList.add('dark-mode');
            }
            // Carregar Nome
            document.getElementById('nome').value = localStorage.getItem('usuario_nome') || '';
            document.getElementById('email').value = localStorage.getItem('usuario_email') || '';
        };

        // 2. ALTERNAR TEMA
        btnTheme.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            
            // Salva a preferência do usuário
            const modoAtual = body.classList.contains('dark-mode') ? 'dark' : 'light';
            localStorage.setItem('tema', modoAtual);
        });

        // 3. SALVAR FORMULÁRIO
        document.getElementById('meuFormulario').addEventListener('submit', (e) => {
            e.preventDefault();
            localStorage.setItem('usuario_nome', document.getElementById('nome').value);
            localStorage.setItem('usuario_email', document.getElementById('email').value);
            document.getElementById('form-content').style.display = 'none';
            document.getElementById('status-mensagem').style.display = 'block';
        });

        // 4. LIMPAR
        document.getElementById('btnLimpar').addEventListener('click', () => {
            if(confirm("Apagar tudo?")) {
                localStorage.clear();
                location.reload();
            }
        });
    </script>
</body>
</html>
